name: Spicerack
options:
  bundleIdPrefix: com.shimondeitel.spiceindex
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Spicerack:
    type: application
    platform: iOS
    sources:
      - path: Spicerack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spiceindex
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Spicerack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SpicerackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SpicerackTests
    dependencies:
      - target: Spicerack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spiceindex.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SpicerackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SpicerackUITests
    dependencies:
      - target: Spicerack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spiceindex.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Spicerack:
    build:
      targets:
        Spicerack: all
        SpicerackTests: [test]
        SpicerackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Spicerack.storekit
    test:
      config: Debug
      storeKitConfiguration: Spicerack.storekit
      targets:
        - SpicerackTests
        - SpicerackUITests
    archive:
      config: Release
