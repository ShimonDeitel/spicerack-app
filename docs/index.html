<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spice Rack Index</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#241512; color:#FBEDE7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width: 560px; padding: 40px 24px; }
  h1 { font-size: 2.2rem; color: #D1495B; margin-bottom: 12px; }
  p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }
  .badge { display:inline-block; margin-top: 24px; padding: 10px 20px; border: 1px solid #D1495B; border-radius: 24px; color: #D1495B; text-decoration:none; margin-right: 8px; }
  footer { margin-top: 40px; font-size: 0.85rem; opacity: 0.6; }
  a { color: #D1495B; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #D1495B55 0%, #D1495B00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Spice Rack Index</h1>
  <p>Catalog every spice and seasoning you own so you stop buying duplicates.</p>
  <a class="badge" href="privacy.html">Privacy Policy</a>
  <a class="badge" href="terms.html">Terms of Use</a>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
